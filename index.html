<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetArt - Loja Completa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #FF6B6B; color: white; padding: 2rem; text-align: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .btn { background: #4ECDC4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>PetArt - Nossa Loja</h1>
    </header>

    <div class="products-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?w=400" alt="Cama Pet">
            <h3>Cama Artesanal Premium</h3>
            <p>R$ 99,90</p>
            <button class="btn" onclick="alert('Produto adicionado!')">Comprar Agora</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=400" alt="Arranhador">
            <h3>Arranhador Designer</h3>
            <p>R$ 49,90</p>
            <button class="btn" onclick="alert('Produto adicionado!')">Comprar Agora</button>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1576201836106-db1758fd1c97?w=400" alt="Brinquedo">
            <h3>Brinquedo Interativo</h3>
            <p>R$ 129,90</p>
            <button class="btn" onclick="alert('Produto adicionado!')">Comprar Agora</button>
        </div>
    </div>
</body>
</html>
