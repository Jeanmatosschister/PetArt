<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetArt - Loja Completa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        header { background: #FF6B6B; color: white; padding: 3rem; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .btn { background: #4ECDC4; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>PetArt - Nossa Loja</h1>
        <p>Amor em cada detalhe para o seu pet</p>
    </header>

    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?w=600" alt="Cama">
            <h3>Cama Artesanal Premium</h3>
            <p>R$ 299,90</p>
            <button class="btn" onclick="alert('Adicionado ao carrinho!')">Comprar Agora</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=600" alt="Arranhador">
            <h3>Arranhador Designer</h3>
            <p>R$ 249,90</p>
            <button class="btn" onclick="alert('Adicionado ao carrinho!')">Comprar Agora</button>
        </div>
    </div>
</body>
</html>
