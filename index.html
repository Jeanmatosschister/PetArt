<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetArt - Amor em Cada Detalhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --dark: #2C3E50; --light: #F7F9FC; }
        body { font-family: 'Outfit', sans-serif; background: var(--light); color: var(--dark); margin: 0; }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(135deg, #FFF5F5 0%, #F0FFFE 100%); }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 1rem; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding: 4rem 5%; max-width: 1200px; margin: auto; }
        .product-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); }
        .btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        /* Animação simples de entrada */
        .fade-in { animation: fadeIn 1.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="fade-in">
    <section class="hero">
        <div>
            <h1>PetArt - Arte & Amor</h1>
            <p>Descubra produtos exclusivos para o seu melhor amigo.</p>
        </div>
    </section>

    <div class="products-grid">
        <div class="product-card">
            <h3>Cama Artesanal Premium</h3>
            <p>R$ 299,90</p>
            <button class="btn">Comprar</button>
        </div>
        <div class="product-card">
            <h3>Arranhador Designer</h3>
            <p>R$ 249,90</p>
            <button class="btn">Comprar</button>
        </div>
    </div>
</body>
</html>
