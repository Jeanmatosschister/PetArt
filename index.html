<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetArt - Amor em Cada Detalhe</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF6B6B; --secondary: #4ECDC4; --accent: #FFE66D; --dark: #2C3E50; --light: #F7F9FC; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--light); color: var(--dark); overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: white; box-shadow: 0 5px 30px rgba(0,0,0,0.1); }
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 100px 5% 50px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; max-width: 1200px; margin: 4rem auto; padding: 0 5%; }
        .product-card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); transition: 0.3s; padding: 20px; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; }
        .product-info { padding: 1.5rem; text-align: left; }
        .btn-add { background: #FF6B6B; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PetArt</div>
    </nav>

    <section class="hero">
        <div>
            <h1>Produtos únicos para <span>quem ama animais</span></h1>
            <p>Descubra nossa coleção exclusiva.</p>
        </div>
    </section>

    <section class="products-grid">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?w=600" alt="Cama Pet">
            <div class="product-info">
                <h3>Cama Artesanal Premium</h3>
                <p>R$ 299,90</p>
                <button class="btn-add">Adicionar</button>
            </div>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=600" alt="Arranhador">
            <div class="product-info">
                <h3>Arranhador Designer</h3>
                <p>R$ 249,90</p>
                <button class="btn-add">Adicionar</button>
            </div>
        </div>
    </section>
</body>
</html>
